# macOS / Windows Docker Desktop note: ZAP runs inside a container and reaches
# the host via `host.docker.internal`. On Linux, use `localhost` after passing
# `--network=host` to docker, OR switch this URL to `http://172.17.0.1:3000`.
app: juice-shop

envs:
  staging:
    targets:
      - name: frontend
        url: http://host.docker.internal:3000
        auth:
          type: form
          loginUrl: http://host.docker.internal:3000/rest/user/login
          loginRequestBody: 'email={%username%}&password={%password%}'
          usernameField: email
          passwordField: password
          loggedInIndicator: 'authentication'

      - name: api
        url: http://host.docker.internal:3000/api
        auth:
          type: form
          loginUrl: http://host.docker.internal:3000/rest/user/login
          loginRequestBody: 'email={%username%}&password={%password%}'
          usernameField: email
          passwordField: password
          loggedInIndicator: 'authentication'
